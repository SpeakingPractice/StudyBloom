
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBloom - Lunar New Year Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Titan+One&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #5C94FC;
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
            color: #5D2E17;
        }

        .mario-font {
            font-family: 'Titan One', cursive;
        }

        .pixel-font {
            font-family: 'Press Start 2P', cursive;
        }

        .sky-bg {
            background-color: #5C94FC;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.4) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.3) 0%, transparent 25%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            border: 4px solid #8B6914;
            box-shadow: 0 8px 0 rgba(77, 43, 23, 0.4);
            border-radius: 1rem;
        }

        .brick-panel {
            background: #8B4513;
            border: 4px solid #5C3010;
            box-shadow: 0 4px 0 #5C3010;
        }

        @keyframes flower-pulse {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.8; }
            50% { transform: scale(1.1) rotate(10deg); opacity: 1; }
        }
        .title-flower {
            animation: flower-pulse 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .cloud-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes mario-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .q-block:hover {
            animation: mario-bounce 0.4s ease infinite;
        }

        .q-block {
            background: #FBD000;
            border: 4px solid #C8980A;
            box-shadow: 0 4px 0 #8B6914;
            transition: all 0.1s;
        }
        .q-block:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8B6914;
        }

        @keyframes marioJump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }
        .jump {
            animation: marioJump 0.4s ease;
        }

        @keyframes marioRun {
            0% { left: 0; }
            100% { left: calc(100% - 56px); }
        }
        .mario-walking {
            animation: marioRun 4s linear infinite;
        }
        
        /* Pause walking during jump/shake */
        .mario-active .mario-walking {
            animation-play-state: paused;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.3s ease-in-out;
        }

        .animate-shake {
            animation: shake 0.2s ease-in-out infinite;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite": "https://esm.sh/vite@^7.3.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>

    <script type="module" src="/index.tsx"></script>
</body>
</html>
